# Production Compose Configuration
x-laravel-env: &laravel-env
  APP_NAME: ${APP_NAME}
  APP_ENV: ${APP_ENV:-production}
  APP_KEY: ${APP_KEY}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_URL: ${APP_URL}
  APP_PORT: ${APP_PORT:-80}
  APP_LOCALE: ${APP_LOCALE:-en}
  APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-en}
  LOG_CHANNEL: ${LOG_CHANNEL:-stack}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DB_CONNECTION: ${DB_CONNECTION:-pgsql}
  DB_HOST: ${DB_HOST:-pgsql}
  DB_PORT: ${DB_PORT:-5432}
  DB_DATABASE: ${DB_DATABASE:-pkn_portal}
  DB_USERNAME: ${DB_USERNAME:-pkn_portal}
  DB_PASSWORD: ${DB_PASSWORD}
  SESSION_DRIVER: ${SESSION_DRIVER:-database}
  SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
  SESSION_ENCRYPT: ${SESSION_ENCRYPT:-false}
  SESSION_PATH: ${SESSION_PATH:-/}
  SESSION_DOMAIN: ${SESSION_DOMAIN:-null}
  BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-log}
  FILESYSTEM_DISK: ${FILESYSTEM_DISK:-public}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
  CACHE_STORE: ${CACHE_STORE:-database}
  REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
  REDIS_PORT: ${REDIS_PORT:-6379}
  TIKA_URL: ${TIKA_URL}
  VITE_APP_NAME: ${VITE_APP_NAME}
  RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}

services:
  app:
    # Pull the image from the registry instead of building it natively.
    image: ${IMAGE_NAME:-ghcr.io/username/pkn-portal}:latest
    pull_policy: always
    environment: *laravel-env
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_code:/var/www/html
      - public_storage:/var/www/html/storage/app/public
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "artisan", "about"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - app_code:/var/www/html:ro
      - public_storage:/var/www/html/public/storage:ro
    command:
      - /bin/sh
      - -c
      - |
        cat >/etc/nginx/conf.d/default.conf <<'EOF'
        server {
            listen 80;
            listen [::]:80;
            server_name portal.karakternabawiyah.com;
            root /srv/portal.karakternabawiyah.com/public;

            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-Content-Type-Options "nosniff";

            index index.php;

            charset utf-8;

            location / {
                try_files $uri $uri/ /index.php?$query_string;
            }

            location = /favicon.ico { access_log off; log_not_found off; }
            location = /robots.txt  { access_log off; log_not_found off; }

            error_page 404 /index.php;

            location ~ ^/index\.php(/|$) {
                fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
                fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
                include fastcgi_params;
                fastcgi_hide_header X-Powered-By;
            }

            location ~ /\.(?!well-known).* {
                deny all;
            }
        }
        EOF

        exec nginx -g 'daemon off;'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    image: ${IMAGE_NAME:-ghcr.io/username/pkn-portal}:latest
    pull_policy: always
    environment: *laravel-env
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgsql:
        condition: service_healthy
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=90", "--sleep=3", "--max-time=3600"]
    restart: unless-stopped

  scheduler:
    image: ${IMAGE_NAME:-ghcr.io/username/pkn-portal}:latest
    pull_policy: always
    environment: *laravel-env
    depends_on:
      app:
        condition: service_healthy
    command: ["sh", "-c", "while true; do php artisan schedule:run --no-interaction; sleep 60; done"]
    restart: unless-stopped

  pgsql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-pkn_portal}
      POSTGRES_USER: ${DB_USERNAME:-pkn_portal}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app_code:
  pgsql_data:
  redis_data:
  public_storage:
