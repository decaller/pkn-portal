# this is the komodo compose file, you have to build the image first in komodo

services:
  app:
    # Komodo will build the image. Ensure the Build 'Image Name' matches this.
    image: pkn-portal:latest
    pull_policy: never
    env_file:
      - .env
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - public_storage:/var/www/html/storage/app/public
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "artisan", "about"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      # Ensure this path is correct if the stack is Git-backed in Komodo
      - ./docker/production/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - public_storage:/var/www/html/public/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    image: pkn-portal:latest
    pull_policy: never
    env_file:
      - .env
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgsql:
        condition: service_healthy
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=90", "--sleep=3", "--max-time=3600"]
    restart: unless-stopped

  scheduler:
    image: pkn-portal:latest
    pull_policy: never
    env_file:
      - .env
    depends_on:
      app:
        condition: service_healthy
    command: ["sh", "-c", "while true; do php artisan schedule:run --no-interaction; sleep 60; done"]
    restart: unless-stopped

  pgsql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-pkn_portal}
      POSTGRES_USER: ${DB_USERNAME:-pkn_portal}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgsql_data:
  redis_data:
  public_storage:
