services:
  app:
    build:
      context: .
      dockerfile: docker/production/Dockerfile
    image: pkn-portal-app:latest
    env_file:
      - .env.production
    depends_on:
      - pgsql
      - redis
    volumes:
      - public_storage:/var/www/html/storage/app/public
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./docker/production/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - public_storage:/var/www/html/public/storage
    restart: unless-stopped

  worker:
    image: pkn-portal-app:latest
    env_file:
      - .env.production
    depends_on:
      - app
      - redis
      - pgsql
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=90", "--sleep=3", "--max-time=3600"]
    restart: unless-stopped

  scheduler:
    image: pkn-portal-app:latest
    env_file:
      - .env.production
    depends_on:
      - app
    command: ["sh", "-c", "while true; do php artisan schedule:run --no-interaction; sleep 60; done"]
    restart: unless-stopped

  pgsql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-pkn_portal}
      POSTGRES_USER: ${DB_USERNAME:-pkn_portal}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  pgsql_data:
  redis_data:
  public_storage:
